name: 🛡️ Warrior Task CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: 🔬 Test & Build
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          8.0.x
          10.0.x # Thêm để support net10.0 của bạn

    - name: 📦 Restore dependencies
      # Sửa đường dẫn vào đúng thư mục chứa file .sln
      run: dotnet restore WarriorTask.sln
      working-directory: ./src/WarriorTask
    
    - name: 🏗️ Build solution
      run: dotnet build WarriorTask.sln --no-restore --configuration Release
      working-directory: ./src/WarriorTask
    
    - name: 🧪 Run unit tests
      run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx"
      working-directory: ./src/WarriorTask
      continue-on-error: false
    
    - name: 📊 Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: src/WarriorTask/**/TestResults/*.trx
        retention-days: 7
    
    - name: 📧 Send webhook (Success/Failure)
      if: always() # Chạy trong mọi trường hợp
      run: |
        PR_NUMBER=$(jq --raw-output .number "$GITHUB_EVENT_PATH" 2>/dev/null || echo "0")
        REPO_NAME=$(jq --raw-output .repository.name "$GITHUB_EVENT_PATH" 2>/dev/null || echo "Warrior")
        CONCLUSION="${{ job.status }}"
        EVENT_TYPE=$( [[ "$CONCLUSION" == "success" ]] && echo "ci_passed" || echo "ci_failed" )
        
        # Chỉ curl nếu WEBHOOK_URL tồn tại để tránh lỗi Malformed input
        if [ -n "${{ secrets.WEBHOOK_URL }}" ]; then
          curl -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: check_run" \
            -d "{
              \"event\": \"$EVENT_TYPE\",
              \"repository\": {\"name\": \"$REPO_NAME\"},
              \"check_run\": {
                \"conclusion\": \"$CONCLUSION\",
                \"status\": \"completed\",
                \"pull_requests\": [{\"number\": $PR_NUMBER}]
              }
            }"
        else
          echo "⚠️ WEBHOOK_URL is missing. Please add it to Repository Secrets."
        fi

  lint:
    name: 🔍 Code Style Check
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: 🔍 Run analyzers
      run: dotnet format --verify-no-changes --severity info
      working-directory: ./src/WarriorTask
      continue-on-error: true